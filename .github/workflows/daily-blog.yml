name: Auto-publish blog (every 12h)

on:
  schedule:
    # Every 12 hours: 04:00 and 16:00 UTC (09:30 + 21:30 IST)
    - cron: "0 4,16 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-blog
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: Generate blog post
        id: gen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate_blog.py

      - name: Commit and push
        id: push
        env:
          SLUG: ${{ steps.gen.outputs.slug }}
          TITLE: ${{ steps.gen.outputs.title }}
        run: |
          git config user.name "sarvaya-bot"
          git config user.email "bot@users.noreply.github.com"
          git add blog/ assets/images/blog/ blog.html sitemap.xml llms.txt scripts/topics_log.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "blog: auto-publish ${SLUG}

          ${TITLE}"
          git push

      - name: Notify on success
        if: success() && steps.gen.outputs.slug != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          from: SARVAYA Auto-Blog <${{ secrets.GMAIL_USER }}>
          to: ${{ secrets.NOTIFY_EMAIL }}
          subject: "✅ New blog published: ${{ steps.gen.outputs.title }}"
          body: |
            A new post just went live on sarvaya.in.

            Title: ${{ steps.gen.outputs.title }}
            Slug:  ${{ steps.gen.outputs.slug }}
            URL:   https://sarvaya.in/blog/${{ steps.gen.outputs.slug }}.html

            Run log: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          content_type: text/plain

      - name: Notify on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          from: SARVAYA Auto-Blog <${{ secrets.GMAIL_USER }}>
          to: ${{ secrets.NOTIFY_EMAIL }}
          subject: "❌ Auto-blog run FAILED (${{ github.run_id }})"
          body: |
            The scheduled blog pipeline just failed.

            Repo: ${{ github.repository }}
            Run:  https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Ref:  ${{ github.ref_name }}
            Triggered by: ${{ github.event_name }}

            Open the run URL above and click the red step to see the error.
          content_type: text/plain
