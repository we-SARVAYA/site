name: Auto-publish blog (every 12h)

on:
  schedule:
    # Every 12 hours: 04:00 and 16:00 UTC (09:30 + 21:30 IST)
    - cron: "0 4,16 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-blog
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Publish next queued post
        id: pub
        run: python scripts/publish_next.py

      - name: Commit and push
        id: push
        if: steps.pub.outputs.slug != ''
        env:
          SLUG: ${{ steps.pub.outputs.slug }}
          TITLE: ${{ steps.pub.outputs.title }}
          REMAINING: ${{ steps.pub.outputs.remaining }}
        run: |
          git config user.name "sarvaya-bot"
          git config user.email "bot@users.noreply.github.com"
          git add blog/ assets/images/blog/ blog.html index.html sitemap.xml llms.txt scripts/topics_log.json scripts/post_queue/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "blog: auto-publish ${SLUG} (${REMAINING} left in queue)

          ${TITLE}"
          git push

      - name: Notify on success
        if: success() && steps.pub.outputs.slug != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          from: SARVAYA Auto-Blog <${{ secrets.GMAIL_USER }}>
          to: ${{ secrets.NOTIFY_EMAIL }}
          subject: "✅ New blog published: ${{ steps.pub.outputs.title }} (${{ steps.pub.outputs.remaining }} left)"
          body: |
            A new post just went live on sarvaya.in.

            Title:     ${{ steps.pub.outputs.title }}
            Slug:      ${{ steps.pub.outputs.slug }}
            URL:       https://sarvaya.in/blog/${{ steps.pub.outputs.slug }}
            Remaining: ${{ steps.pub.outputs.remaining }} post(s) in queue

            Run log: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          content_type: text/plain

      - name: Notify on empty queue
        if: success() && steps.pub.outputs.queue_empty == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          from: SARVAYA Auto-Blog <${{ secrets.GMAIL_USER }}>
          to: ${{ secrets.NOTIFY_EMAIL }}
          subject: "⚠️ Blog queue is empty — refill needed"
          body: |
            The auto-blog publisher ran but the queue is empty. No post was published this cycle.

            Refill the queue by running the /refill-blog-queue command in Claude Code, then commit and push.

            Run log: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          content_type: text/plain

      - name: Notify on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          from: SARVAYA Auto-Blog <${{ secrets.GMAIL_USER }}>
          to: ${{ secrets.NOTIFY_EMAIL }}
          subject: "❌ Auto-blog run FAILED (${{ github.run_id }})"
          body: |
            The scheduled blog pipeline just failed.

            Repo: ${{ github.repository }}
            Run:  https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Ref:  ${{ github.ref_name }}
            Triggered by: ${{ github.event_name }}

            Open the run URL above and click the red step to see the error.
          content_type: text/plain
